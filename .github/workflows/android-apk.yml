name: Android APK - UP Entregador

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.14.2

      - name: Build debug APK
        run: gradle :app:assembleDebug --stacktrace

      - name: Extract app version
        id: version
        shell: bash
        run: |
          VERSION_NAME=$(grep 'versionName' app/build.gradle.kts | head -n 1 | sed 's/.*versionName = "\(.*\)".*/\1/')
          VERSION_CODE=$(grep 'versionCode' app/build.gradle.kts | head -n 1 | sed 's/.*versionCode = //')
          SAFE_VERSION=$(echo "$VERSION_NAME" | tr -c 'A-Za-z0-9._-' '_')
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "safe_version=$SAFE_VERSION" >> "$GITHUB_OUTPUT"
          echo "Versão detectada: $VERSION_NAME ($VERSION_CODE)"

      - name: Rename debug APK with version
        shell: bash
        run: |
          mkdir -p release-apk
          cp app/build/outputs/apk/debug/app-debug.apk "release-apk/UP_Entregador_v${{ steps.version.outputs.safe_version }}_debug.apk"
          ls -lh release-apk

      - name: Upload APK artifact with version
        uses: actions/upload-artifact@v4
        with:
          name: UP_Entregador_v${{ steps.version.outputs.safe_version }}_APK
          path: release-apk/*.apk
          if-no-files-found: error
